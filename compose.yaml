version: '3.9'

services:

  mariadb:
    image: mariadb:11
    container_name: linkforge-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: linkforge

    ports:
      - "3306:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: